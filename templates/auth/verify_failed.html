{% extends "auth_base.html" %}

{% block content %}
<div class="auth-page">
<div class="auth-card">

    <h2>Xác nhận thất bại</h2>
    <p class="auth-sub">
        Link xác nhận không hợp lệ hoặc đã hết hạn.<br>
        Bạn có thể đăng ký lại hoặc yêu cầu gửi lại email.
    </p>

    <!-- ✅ resend -->
    <form method="post" action="{% url 'resend_verify' %}" style="margin-bottom: 12px;">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Nhập email của bạn" required class="auth-input">
        <button type="submit" class="auth-btn">Gửi lại mã xác thực</button>
    </form>

    <!-- fallback -->
    <a href="{% url 'signup' %}" class="auth-btn secondary">Đăng ký lại</a>

</div>
</div>
{% endblock %}
