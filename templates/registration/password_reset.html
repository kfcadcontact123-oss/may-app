{% extends "auth_base.html" %}

{% block content %}
<div class="auth-page">

<div class="auth-card">
    <h2>Quên mật khẩu</h2>
    <p class="auth-sub">Nhập email để nhận link đặt lại mật khẩu</p>

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email" required>
        <button class="auth-btn">Gửi link</button>
    </form>

    <a href="{% url 'login' %}" class="auth-link">Quay lại đăng nhập</a>
</div>

</div>
{% endblock %}
