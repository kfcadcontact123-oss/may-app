{% extends "auth_base.html" %}

{% block content %}
<div class="auth-page">

<div class="auth-card">
    <h2>Đặt lại mật khẩu</h2>

    <form method="post">
        {% csrf_token %}

        <div class="password-field">
    <input type="password" name="new_password1" placeholder="Mật khẩu mới">
    <span class="toggle-password">👁</span>
</div>
        <div class="password-field">
    <input type="password" name="new_password2" placeholder="Xác nhận mật khẩu">
    <span class="toggle-password">👁</span>
</div>

        <button class="auth-btn">Đổi mật khẩu</button>
    </form>

    <!-- 🔥 HIỂN THỊ ERROR -->
    {% if form.errors %}
        <div class="auth-error">
            {{ form.errors }}
        </div>
    {% endif %}

</div>

</div>
{% endblock %}
