<svg class="robot-wave" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- body -->
  <rect x="14" y="20" width="36" height="26" rx="10" fill="#EEF2FF" stroke="#5B6CFF" stroke-width="2"></rect>

  <!-- eyes -->
  <circle cx="26" cy="32" r="2.5" fill="#5B6CFF"></circle>
  <circle cx="38" cy="32" r="2.5" fill="#5B6CFF"></circle>

  <!-- smile -->
  <path d="M26 38C28 40 36 40 38 38" stroke="#5B6CFF" stroke-width="2" stroke-linecap="round"></path>

  <!-- antenna -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#5B6CFF" stroke-width="2"></line>
  <circle cx="32" cy="10" r="2" fill="#5B6CFF"></circle>

  <!-- LEFT ARM (static) -->
  <line x1="14" y1="30" x2="6" y2="34" stroke="#5B6CFF" stroke-width="2" stroke-linecap="round"></line>

  <!-- RIGHT ARM (ANIMATED) -->
  <g class="robot-arm">
    <line x1="50" y1="30" x2="58" y2="24" stroke="#5B6CFF" stroke-width="2" stroke-linecap="round"></line>
  </g>
</svg>